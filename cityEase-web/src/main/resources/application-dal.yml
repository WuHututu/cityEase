spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${database.name}?TimeZone=Asia/Shanghai
    username: ${database.username}
    password: ${database.password}

  # redis配置
  redis:
    # Redis服务器地址
    host: ${cache.redis.host}
    # Redis服务器连接端口
    port: ${cache.redis.port}
    # Redis服务器连接密码（默认为空）
#    password: ${cache.redis.password}
    # 连接超时时间
    timeout: ${cache.redis.timeout}
    lettuce:
      pool:
        # 连接池最大连接数
        max-active: 200
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 10
        # 连接池中的最小空闲连接
        min-idle: 0
