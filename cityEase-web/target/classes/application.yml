server:
  port: 8080

#数据库配置
database:
  host: 192.168.200.147
  port: 3306
  name: city_ease
  username: root
  password: 123456


# mybatis 相关统一配置
mybatis-plus:
  configuration:
    #开启下划线转驼峰
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 全局逻辑删除配置
      logic-delete-field: isDeleted  # 全局逻辑删除字段名
      logic-delete-value: 1  # 逻辑已删除值
      logic-not-delete-value: 0  # 逻辑未删除值

security:
  salt: city_ease # 密码加盐, 更安全的做法是每个用户的密码使用独立的盐，并将其保存在用户表中
  salt-index: 3 # 盐插入的位置

spring:
  config:
    import: application-dal.yml,application-login.yml
  redis:
    host: 192.168.200.147
    port: 6379
    # password:
    timeout: 10000ms
    lettuce:
      pool:
        max-active: 200
        max-wait: -1ms
        max-idle: 20
        min-idle: 5

  rabbitmq:
    host: 192.168.200.147
    port: 5672
    username: root
    password: root
    virtual-host: /
    listener:
      simple:
        #手动 ACK 保证消息不丢失
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3

xxl:
  job:
    admin:
      # 调度中心部署的地址
      addresses: http://192.168.200.147:8080/xxl-job-admin
    executor:
      # 执行器名称，必须和 XXL-JOB 后台配置的一致
      appname: cityease-executor
      ip:
      port: 9999
      logpath: /data/applogs/xxl-job/jobhandler
      logretentiondays: 30
    accessToken: default_token

aliyun:
  oss:
    bucket-name: wuhututu          # 存储桶名称
    endpoint: oss-cn-hangzhou.aliyuncs.com  # 地域Endpoint
    access-key-id: LTAI5tJ5Nkz6MfHZ1PBpGoer      # 你的AccessKey ID
    access-key-secret: zDDedh2iX6xXG8Ec1y82cPmLwWJHNn  # 你的AccessKey Secret
    file-host: wuhututu/       # 上传文件的基础路径

# 文件上传配置
upload:
  type: aliyun  # 上传类型：local-本地存储，aliyun-阿里云 OSS
  path: ${user.dir}/uploads/images/
  url-prefix: /uploads/images/

